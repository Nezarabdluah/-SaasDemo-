<abp-page title="Create New Blog Post">
  <div class="card">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">
        
        <div class="mb-3">
          <label class="form-label" for="title">Title <span class="text-danger">*</span></label>
          <input type="text" id="title" class="form-control" formControlName="title" />
          <div *ngIf="form.get('title')?.invalid && form.get('title')?.touched" class="text-danger mt-1">
            Title is required.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="slug">Slug <span class="text-danger">*</span></label>
          <input type="text" id="slug" class="form-control" formControlName="slug" />
          <div *ngIf="form.get('slug')?.invalid && form.get('slug')?.touched" class="text-danger mt-1">
            Slug is required.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="shortDescription">Short Description</label>
          <textarea id="shortDescription" class="form-control" formControlName="shortDescription" rows="2"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label" for="content">Content <span class="text-danger">*</span></label>
          <textarea id="content" class="form-control" formControlName="content" rows="6"></textarea>
          <div *ngIf="form.get('content')?.invalid && form.get('content')?.touched" class="text-danger mt-1">
            Content is required.
          </div>
        </div>

        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label" for="categoryIds">Categories</label>
            <select id="categoryIds" class="form-select" formControlName="categoryIds" multiple style="min-height: 100px;">
              <option *ngFor="let category of categories" [ngValue]="category.id">
                {{ category.name }}
              </option>
            </select>
            <small class="text-muted">Hold Ctrl/Command to select multiple.</small>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label" for="tagIds">Tags</label>
            <select id="tagIds" class="form-select" formControlName="tagIds" multiple style="min-height: 100px;">
              <option *ngFor="let tag of tags" [ngValue]="tag.id">
                {{ tag.name }}
              </option>
            </select>
            <small class="text-muted">Hold Ctrl/Command to select multiple.</small>
          </div>
        </div>

        <div class="row">
          <div class="col-md-4 mb-3">
            <label class="form-label" for="status">Status</label>
            <select id="status" class="form-select" formControlName="status">
              <option [ngValue]="0">Draft</option>
              <option [ngValue]="1">Published</option>
              <option [ngValue]="2">Scheduled</option>
            </select>
          </div>

          <div class="col-md-4 mb-3" *ngIf="form.get('status')?.value === 2">
            <label class="form-label" for="publishedAt">Publish Date</label>
            <input type="datetime-local" id="publishedAt" class="form-control" formControlName="publishedAt" />
          </div>

          <div class="col-md-4 mb-3">
            <label class="form-label" for="featuredImageUrl">Featured Image URL</label>
            <input type="url" id="featuredImageUrl" class="form-control" formControlName="featuredImageUrl" />
          </div>
        </div>

        <div class="mt-4 pt-2 border-top">
          <a routerLink="/blogs" class="btn btn-secondary me-2">Cancel</a>
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid || isSaving">
            <i class="fa fa-save me-1"></i> Save
          </button>
        </div>

      </form>
    </div>
  </div>
</abp-page>
