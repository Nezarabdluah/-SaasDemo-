<abp-page title="Blog Tags">
  <div class="row">
    <div class="col-12 mb-3 text-end">
      <button class="btn btn-primary" (click)="openModal()">
        <i class="fa fa-plus me-1"></i> New Blog Tag
      </button>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead>
            <tr>
              <th>Name</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of items">
              <td>{{ item.name }}</td>
              <td>
                <button class="btn btn-sm btn-info me-1" (click)="edit(item.id)">
                  <i class="fa fa-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-danger" (click)="delete(item.id)">
                  <i class="fa fa-trash"></i> Delete
                </button>
              </td>
            </tr>
            <tr *ngIf="items.length === 0">
              <td colspan="2" class="text-center">No tags found.</td>
            </tr>
          </tbody>
        </table>
      </div>
      
      <!-- Basic Pagination Controls -->
      <div class="d-flex justify-content-between align-items-center mt-3" *ngIf="totalCount > 0">
        <div>
          Showing {{ skipCount + 1 }} to {{ Math.min(skipCount + maxResultCount, totalCount) }} of {{ totalCount }} entries
        </div>
        <div>
          <button class="btn btn-outline-secondary btn-sm me-2" [disabled]="skipCount === 0" (click)="prevPage()">Previous</button>
          <button class="btn btn-outline-secondary btn-sm" [disabled]="skipCount + maxResultCount >= totalCount" (click)="nextPage()">Next</button>
        </div>
      </div>
    </div>
  </div>
</abp-page>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h3>{{ selectedId ? 'Edit Blog Tag' : 'New Blog Tag' }}</h3>
  </ng-template>
  
  <ng-template #abpBody>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="mb-3">
        <label class="form-label" for="tag-name">Name <span class="text-danger">*</span></label>
        <input type="text" id="tag-name" class="form-control" formControlName="name" autofocus />
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>Cancel</button>
    <button type="button" class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check me-1"></i> Save
    </button>
  </ng-template>
</abp-modal>
