<!-- Modal Backdrop -->
<div class="modal fade" [class.show]="isOpen" [style.display]="isOpen ? 'block' : 'none'" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable">
    <div class="modal-content">
      
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">
          <i class="fa fa-images me-2"></i>اختر صورة من المكتبة
        </h5>
        <button type="button" class="btn-close btn-close-white" (click)="close()"></button>
      </div>

      <div class="modal-body">
        
        <!-- Quick Upload (Drag & Drop Zone) -->
        <div class="upload-zone d-flex align-items-center gap-2 mb-3 p-3 border-dashed rounded bg-light" 
             appDragDrop (fileDropped)="onFileDropped($event)">
          <div class="me-3 text-primary">
            <i class="fa fa-cloud-upload fa-2x"></i>
          </div>
          <div class="flex-grow-1">
            <h6 class="mb-1">اسحب الصورة هنا للرفع السريع</h6>
            <input type="file" class="form-control form-control-sm d-inline-block w-auto" (change)="onFileSelected($event)">
            <span *ngIf="selectedFile" class="ms-2 badge bg-success">{{ selectedFile.name }}</span>
          </div>
          <button class="btn btn-sm btn-success" [disabled]="!selectedFile || isUploading" (click)="uploadAndSelect()">
            <i class="fa fa-upload me-1"></i>
            {{ isUploading ? 'جاري...' : 'رفع واختيار' }}
          </button>
          <div class="ms-auto ps-3 border-start">
            <input type="text" class="form-control form-control-sm" style="width: 200px;" placeholder="بحث السريع..." [(ngModel)]="filter" (keyup.enter)="loadMedia()">
          </div>
        </div>

        <!-- Image Grid -->
        <div class="row g-2">
          <div *ngFor="let file of mediaFiles" class="col-md-2 col-sm-4 col-6">
            <div class="card media-card overflow-hidden cursor-pointer" style="cursor: pointer;" (click)="selectImage(file)"
                 [class.border-primary]="false" [class.shadow-sm]="true">
              <img [src]="getMediaUrl(file.id)" class="card-img-top" style="height: 100px; object-fit: cover;" [alt]="file.altText || file.fileName">
              <div class="card-body p-1 text-center" style="font-size: 0.75rem;">
                <p class="text-truncate mb-0" [title]="file.fileName">{{ file.fileName }}</p>
              </div>
            </div>
          </div>

          <div *ngIf="mediaFiles.length === 0" class="col-12 text-center p-4 text-muted">
            <i class="fa fa-image fa-2x mb-2"></i>
            <p>لا يوجد صور. قم برفع صورة جديدة.</p>
          </div>
        </div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="close()">إلغاء</button>
      </div>

    </div>
  </div>
</div>
<div class="modal-backdrop fade" [class.show]="isOpen" *ngIf="isOpen"></div>
