<form [formGroup]="form" (ngSubmit)="submit()" class="comment-form mt-3">
  <div class="mb-3">
    <textarea
      formControlName="text"
      class="form-control"
      rows="3"
      placeholder="اكتب تعليقك هنا..."
    ></textarea>
  </div>
  <div class="d-flex justify-content-end gap-2">
    <button
      *ngIf="repliedCommentId || editCommentId"
      type="button"
      class="btn btn-sm btn-light"
      (click)="cancel.emit()"
      [disabled]="isSaving"
    >
      إلغاء
    </button>
    <button
      type="submit"
      class="btn btn-sm btn-primary"
      [disabled]="form.invalid || isSaving"
    >
      <i class="fa fa-spinner fa-spin me-1" *ngIf="isSaving"></i>
      {{ editCommentId ? 'تحديث التعليق' : 'إرسال التعليق' }}
    </button>
  </div>
</form>
