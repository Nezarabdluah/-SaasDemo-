<div class="d-flex mb-3">
  <!-- Avatar Placeholder -->
  <div class="me-3">
    <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
         style="width: 48px; height: 48px; font-weight: bold;">
      {{ comment.author?.name?.charAt(0) || 'U' }}
    </div>
  </div>

  <div class="flex-grow-1">
    <div class="bg-light p-3 rounded">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h6 class="mb-0 fw-bold">{{ comment.author?.name }} {{ comment.author?.surname }}</h6>
        <small class="text-muted">{{ comment.creationTime | date:'short' }}</small>
      </div>

      <!-- Comment Text -->
      <div *ngIf="!isEditing" class="comment-text mb-0" style="white-space: pre-wrap;">{{ comment.text }}</div>

      <!-- Edit Form -->
      <div *ngIf="isEditing">
        <app-comment-form
          [entityType]="entityType"
          [entityId]="entityId"
          [editCommentId]="comment.id"
          [initialText]="comment.text"
          (commentSaved)="onCommentSaved()"
          (cancel)="isEditing = false"
        ></app-comment-form>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="d-flex gap-3 mt-2 text-muted" style="font-size: 0.9rem;">
      <a href="javascript:void(0)" class="text-decoration-none" (click)="toggleReplyForm()">رد</a>
      <a href="javascript:void(0)" *ngIf="isMyComment" class="text-decoration-none" (click)="toggleEditForm()">تعديل</a>
      <a href="javascript:void(0)" *ngIf="isMyComment" class="text-danger text-decoration-none" (click)="deleteComment()">حذف</a>
    </div>

    <!-- Reply Form -->
    <div *ngIf="showReplyForm" class="mt-2 ms-4">
      <app-comment-form
        [entityType]="entityType"
        [entityId]="entityId"
        [repliedCommentId]="comment.id"
        (commentSaved)="onCommentSaved()"
        (cancel)="showReplyForm = false"
      ></app-comment-form>
    </div>

    <!-- Nested Replies (Recursive structure) -->
    <div *ngIf="comment.replies && comment.replies.length > 0" class="mt-4 ms-4 pe-3 border-start">
      <app-comment-item
        *ngFor="let reply of comment.replies"
        [comment]="reply"
        [entityType]="entityType"
        [entityId]="entityId"
        (commentChanged)="commentChanged.emit()"
      ></app-comment-item>
    </div>
  </div>
</div>
