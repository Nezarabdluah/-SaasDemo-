<abp-page [title]="post?.title || 'Loading...'">
  <div class="row">
    <div class="col-12 mb-3">
      <a routerLink="/blogs" class="btn btn-secondary">
        <i class="fa fa-arrow-left me-1"></i> Back to list
      </a>
    </div>
  </div>

  <div class="card" *ngIf="post">
    <div class="card-body">
      <h5>{{ post.title }}</h5>
      <p class="text-muted mb-4 pb-2 border-bottom">
        Slug: {{ post.slug }} | 
        Status: <span class="badge" [ngClass]="post.isPublished ? 'bg-success' : 'bg-warning'">
          {{ post.isPublished ? 'Published' : 'Draft' }}
        </span>
      </p>
      
      <h6>Short Description:</h6>
      <p>{{ post.shortDescription || 'No description provided.' }}</p>
      
      <h6 class="mt-4">Content:</h6>
      <div class="p-3 bg-light rounded" style="white-space: pre-wrap;">{{ post.content }}</div>
    </div>
  </div>

  <div class="text-center mt-5" *ngIf="!post">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>
</abp-page>
